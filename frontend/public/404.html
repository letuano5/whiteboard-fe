<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Tactical Whiteboard</title>
  </head>
  <body>
    <script>
      // GitHub Pages is a static host with no SPA fallback: a hard navigation
      // or refresh on a path like /whiteboard-fe/dashboard hits this 404 page
      // before any app JS runs. Stash the intended path and bounce back to
      // the app root; src/app/routing.ts restores it on load.
      sessionStorage.setItem('gh-pages-redirect', location.pathname + location.search);
      location.replace('/whiteboard-fe/');
    </script>
  </body>
</html>
